<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background-image: url('WonderLan_01_WEBP.webp');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 60px 80px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #ffffff;
            font-size: 3em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            letter-spacing: 2px;
        }

        .countdown {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .time-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-value {
            font-size: 4em;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            line-height: 1;
            transition: all 0.3s ease;
            min-width: 140px;
        }

        .time-value.green {
            color: #00ff00;
            text-shadow: 0 0 20px rgba(0, 255, 0, 1);
        }

        .time-label {
            font-size: 1.2em;
            color: #ffffff;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .separator {
            font-size: 3em;
            color: #00ffff;
            align-self: center;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        .separator.green {
            color: #00ff00;
            text-shadow: 0 0 20px rgba(0, 255, 0, 1);
        }

        p {
            color: #ffffff;
            margin-top: 40px;
            font-size: 1.3em;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 768px) {
            body {
                background-size: cover;
            }

            .container {
                padding: 40px 30px;
            }

            h1 {
                font-size: 2em;
            }

            .time-value {
                font-size: 2.5em;
                min-width: 90px;
            }

            .time-label {
                font-size: 0.9em;
            }

            .countdown {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>COUNTDOWN TO WonderLAN</h1>
        <div class="countdown">
            <div class="time-unit">
                <div class="time-value" id="days">00</div>
                <div class="time-label">Days</div>
            </div>
            <div class="separator" id="sep1">:</div>
            <div class="time-unit">
                <div class="time-value" id="hours">00</div>
                <div class="time-label">Hours</div>
            </div>
            <div class="separator" id="sep2">:</div>
            <div class="time-unit">
                <div class="time-value" id="minutes">00</div>
                <div class="time-label">Minutes</div>
            </div>
            <div class="separator" id="sep3">:</div>
            <div class="time-unit">
                <div class="time-value" id="seconds">00</div>
                <div class="time-label">Seconds</div>
            </div>
        </div>
        <p id="message"></p>
    </div>

    <script>
        // Set your target date here (format: YYYY-MM-DD HH:mm:ss)
        const targetDate = new Date('2026-05-23 10:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            // Calculate time units
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Update DOM
            const daysEl = document.getElementById('days');
            const hoursEl = document.getElementById('hours');
            const minutesEl = document.getElementById('minutes');
            const secondsEl = document.getElementById('seconds');
            const message = document.getElementById('message');
            const separators = [document.getElementById('sep1'), document.getElementById('sep2'), document.getElementById('sep3')];

            daysEl.textContent = String(days).padStart(2, '0');
            hoursEl.textContent = String(hours).padStart(2, '0');
            minutesEl.textContent = String(minutes).padStart(2, '0');
            secondsEl.textContent = String(seconds).padStart(2, '0');

            // Check if countdown reached zero
            if (distance <= 0) {
                daysEl.classList.add('green');
                hoursEl.classList.add('green');
                minutesEl.classList.add('green');
                secondsEl.classList.add('green');
                separators.forEach(sep => sep.classList.add('green'));
                message.textContent = '🎉 GAMING TIME! 🎉';
                message.style.color = '#00ff00';
                message.style.fontSize = '1.8em';
                return;
            } else {
                daysEl.classList.remove('green');
                hoursEl.classList.remove('green');
                minutesEl.classList.remove('green');
                secondsEl.classList.remove('green');
                separators.forEach(sep => sep.classList.remove('green'));
                message.textContent = '';
            }
        }

        // Update countdown immediately and then every second
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
